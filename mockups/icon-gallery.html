<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Icon Gallery</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { text-align: center; color: #4cc9f0; }
        .ui-section {
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        .ui-item {
            text-align: center;
        }
        .ui-item .openmoji-icon {
            width: 60px;
            height: 60px;
            display: block;
            margin: 0 auto 5px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: #16213e;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            border: 1px solid #2a2a40;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #4cc9f0;
        }
        .icon-box {
            width: 100px;
            height: 100px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f3460;
            border-radius: 8px;
        }
        .icon-box img, .icon-box .openmoji-icon {
            max-width: 80px;
            max-height: 80px;
        }
        .name {
            font-weight: bold;
            font-size: 0.9em;
            display: block;
            margin-bottom: 5px;
        }
        .id {
            font-size: 0.7em;
            color: #888;
            font-family: monospace;
        }
        .category-title {
            grid-column: 1 / -1;
            background: #4cc9f0;
            color: #1a1a2e;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Easy Mathematics - OpenMoji Gallery</h1>
    
    <div class="category-title" style="margin-top:0">Global UI Icons</div>
    <div class="ui-section" id="ui-gallery"></div>

    <div class="grid" id="gallery"></div>
</div>

<!-- Mock globals needed for house.js -->
<script>
    const currentGrade = 1;
    const gameState = { totalCoins: 0 };
    const translations = {};
    function t(key) { return key; }
</script>

<script src="../translations.js"></script>
<script src="../house.js"></script>

<script>
    function init() {
        // UI Icons
        const uiGallery = document.getElementById('ui-gallery');
        for (const [name, svg] of Object.entries(UI_SVGS)) {
            const div = document.createElement('div');
            div.className = 'ui-item';
            div.innerHTML = `${svg}<span>${name}</span>`;
            uiGallery.appendChild(div);
        }

        const gallery = document.getElementById('gallery');
        const zones = {};

        // Group items by zone
        SHOP_ITEMS.forEach(item => {
            if (!zones[item.zone]) zones[item.zone] = [];
            zones[item.zone].push(item);
        });

        for (const [zone, items] of Object.entries(zones)) {
            const title = document.createElement('div');
            title.className = 'category-title';
            title.textContent = zone;
            gallery.appendChild(title);

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const iconHtml = ITEM_SVGS[item.id] || 'MISSING';
                
                card.innerHTML = `
                    <div class="icon-box">${iconHtml}</div>
                    <span class="name">${item.nameKey}</span>
                    <span class="id">${item.id}</span>
                `;
                gallery.appendChild(card);
            });
        }
    }
    window.onload = init;
</script>

</body>
</html>
