<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק המתמטיקה - כיתה ג'</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Home Screen -->
        <div id="home-screen" class="screen active">
            <div class="header">
                <h1 class="title" data-lang="title">משחק המתמטיקה</h1>
                <div class="stats-bar">
                    <div class="stat-item">
                        <span class="coin-icon">🪙</span>
                        <span id="total-coins">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="star-icon">⭐</span>
                        <span id="total-stars">0</span>
                    </div>
                    <button id="lang-toggle" class="lang-btn">EN</button>
                </div>
            </div>

            <div class="categories-container">
                <div class="category-card" data-category="0">
                    <div class="category-header">
                        <h2 data-lang="cat0">חיבור עד 100</h2>
                        <div class="category-progress">
                            <span class="progress-text"><span class="solved">0</span>/10</span>
                        </div>
                    </div>
                    <div class="category-stats">
                        <span class="stars-earned">⭐ <span>0</span></span>
                        <span class="coins-earned">🪙 <span>0</span></span>
                    </div>
                    <button class="start-btn" data-lang="start">התחל</button>
                    <div class="lock-overlay">
                        <span class="lock-icon">🔒</span>
                    </div>
                </div>

                <div class="category-card" data-category="1">
                    <div class="category-header">
                        <h2 data-lang="cat1">חיסור עד 100</h2>
                        <div class="category-progress">
                            <span class="progress-text"><span class="solved">0</span>/10</span>
                        </div>
                    </div>
                    <div class="category-stats">
                        <span class="stars-earned">⭐ <span>0</span></span>
                        <span class="coins-earned">🪙 <span>0</span></span>
                    </div>
                    <button class="start-btn" data-lang="start">התחל</button>
                    <div class="lock-overlay">
                        <span class="lock-icon">🔒</span>
                    </div>
                </div>

                <div class="category-card" data-category="2">
                    <div class="category-header">
                        <h2 data-lang="cat2">כפל עד 12</h2>
                        <div class="category-progress">
                            <span class="progress-text"><span class="solved">0</span>/10</span>
                        </div>
                    </div>
                    <div class="category-stats">
                        <span class="stars-earned">⭐ <span>0</span></span>
                        <span class="coins-earned">🪙 <span>0</span></span>
                    </div>
                    <button class="start-btn" data-lang="start">התחל</button>
                    <div class="lock-overlay">
                        <span class="lock-icon">🔒</span>
                    </div>
                </div>

                <div class="category-card" data-category="3">
                    <div class="category-header">
                        <h2 data-lang="cat3">חיבור וחיסור עד 9999</h2>
                        <div class="category-progress">
                            <span class="progress-text"><span class="solved">0</span>/10</span>
                        </div>
                    </div>
                    <div class="category-stats">
                        <span class="stars-earned">⭐ <span>0</span></span>
                        <span class="coins-earned">🪙 <span>0</span></span>
                    </div>
                    <button class="start-btn" data-lang="start">התחל</button>
                    <div class="lock-overlay">
                        <span class="lock-icon">🔒</span>
                    </div>
                </div>

                <div class="category-card" data-category="4">
                    <div class="category-header">
                        <h2 data-lang="cat4">חילוק עד 99</h2>
                        <div class="category-progress">
                            <span class="progress-text"><span class="solved">0</span>/10</span>
                        </div>
                    </div>
                    <div class="category-stats">
                        <span class="stars-earned">⭐ <span>0</span></span>
                        <span class="coins-earned">🪙 <span>0</span></span>
                    </div>
                    <button class="start-btn" data-lang="start">התחל</button>
                    <div class="lock-overlay">
                        <span class="lock-icon">🔒</span>
                    </div>
                </div>

                <div class="category-card" data-category="5">
                    <div class="category-header">
                        <h2 data-lang="cat5">שברים</h2>
                        <div class="category-progress">
                            <span class="progress-text"><span class="solved">0</span>/10</span>
                        </div>
                    </div>
                    <div class="category-stats">
                        <span class="stars-earned">⭐ <span>0</span></span>
                        <span class="coins-earned">🪙 <span>0</span></span>
                    </div>
                    <button class="start-btn" data-lang="start">התחל</button>
                    <div class="lock-overlay">
                        <span class="lock-icon">🔒</span>
                    </div>
                </div>

                <div class="category-card" data-category="6">
                    <div class="category-header">
                        <h2 data-lang="cat6">כפל עד 20</h2>
                        <div class="category-progress">
                            <span class="progress-text"><span class="solved">0</span>/10</span>
                        </div>
                    </div>
                    <div class="category-stats">
                        <span class="stars-earned">⭐ <span>0</span></span>
                        <span class="coins-earned">🪙 <span>0</span></span>
                    </div>
                    <button class="start-btn" data-lang="start">התחל</button>
                    <div class="lock-overlay">
                        <span class="lock-icon">🔒</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Category Screen -->
        <div id="category-screen" class="screen">
            <div class="header">
                <button id="back-to-home" class="back-btn">← <span data-lang="back">חזור</span></button>
                <h2 id="category-title"></h2>
            </div>

            <div class="problems-grid">
                <!-- Problems 1-10 will be generated here -->
            </div>
        </div>

        <!-- Problem Screen -->
        <div id="problem-screen" class="screen">
            <div class="header">
                <button id="back-to-category" class="back-btn">← <span data-lang="back">חזור</span></button>
                <div class="problem-info">
                    <span id="problem-number"></span>
                    <div class="timer-container">
                        <span class="timer-icon">⏱️</span>
                        <span id="timer">0</span>
                    </div>
                </div>
            </div>

            <div class="problem-container">
                <div class="question-box">
                    <h1 id="question"></h1>
                </div>

                <div class="answer-section">
                    <input type="text" id="answer-input" inputmode="numeric" placeholder="?" autocomplete="off">
                    <button id="submit-answer" data-lang="submit">בדוק</button>
                </div>

                <div id="feedback" class="feedback"></div>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <div class="result-container">
                <div id="result-message" class="result-message"></div>
                <div class="stars-display" id="stars-display"></div>
                <div class="rewards">
                    <div class="reward-item">
                        <span class="reward-label" data-lang="coinsEarned">מטבעות שהרווחת:</span>
                        <span class="reward-value">🪙 <span id="coins-earned">0</span></span>
                    </div>
                </div>
                <div class="result-actions">
                    <button id="next-problem" class="primary-btn" data-lang="next">הבא</button>
                    <button id="back-to-category-result" class="secondary-btn" data-lang="backToCategory">חזור לקטגוריה</button>
                </div>
            </div>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="problems.js"></script>
    <script src="game.js"></script>
</body>
</html>
